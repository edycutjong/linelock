<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="LineLock — ledger rows pierced by a rising edge arrow whose tail is a checkmark">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="var(--bg-base, #0A0A12)"/>
      <stop offset="0.55" stop-color="#120714"/>
      <stop offset="1" stop-color="#160607"/>
    </linearGradient>
    <linearGradient id="edgeArrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="var(--primary, #FF007A)"/>
      <stop offset="0.55" stop-color="#FF4DA6"/>
      <stop offset="1" stop-color="var(--accent, #FFB300)"/>
    </linearGradient>
    <linearGradient id="rowFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1220"/>
      <stop offset="1" stop-color="#120a14"/>
    </linearGradient>
    <linearGradient id="rowEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="var(--primary, #FF007A)"/>
      <stop offset="1" stop-color="var(--accent, #FFB300)"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E91E8C" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#E91E8C" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#E91E8C" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="badge"><rect x="24" y="24" width="464" height="464" rx="112"/></clipPath>
  </defs>

  <!-- badge -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <g clip-path="url(#badge)">
    <!-- diagonal energy strips (35°) -->
    <g transform="rotate(-35 256 256)">
      <rect x="-120" y="118" width="760" height="3" fill="url(#strip)"/>
      <rect x="-120" y="196" width="760" height="2" fill="url(#strip)" opacity="0.55"/>
      <rect x="-120" y="392" width="760" height="3" fill="url(#strip)" opacity="0.7"/>
    </g>
    <!-- faint grid -->
    <g stroke="#FF007A" stroke-width="1" opacity="0.07">
      <line x1="24" y1="152" x2="488" y2="152"/><line x1="24" y1="280" x2="488" y2="280"/><line x1="24" y1="408" x2="488" y2="408"/>
      <line x1="152" y1="24" x2="152" y2="488"/><line x1="280" y1="24" x2="280" y2="488"/><line x1="408" y1="24" x2="408" y2="488"/>
    </g>
    <!-- sparks -->
    <g fill="#ffe9f4">
      <circle cx="102" cy="96" r="2.4" opacity="0.8"/>
      <circle cx="418" cy="132" r="1.8" opacity="0.6"/>
      <circle cx="376" cy="76" r="1.5" opacity="0.5"/>
      <circle cx="88" cy="186" r="1.5" opacity="0.45"/>
    </g>
  </g>

  <!-- ledger rows -->
  <g>
    <rect x="112" y="180" width="288" height="60" rx="16" fill="url(#rowFill)" stroke="#3a2340" stroke-width="2.5"/>
    <rect x="112" y="262" width="288" height="60" rx="16" fill="url(#rowFill)" stroke="#3a2340" stroke-width="2.5"/>
    <rect x="112" y="344" width="288" height="60" rx="16" fill="url(#rowFill)" stroke="#3a2340" stroke-width="2.5"/>
    <!-- row data ticks -->
    <g fill="#5b4763">
      <rect x="136" y="204" width="74" height="12" rx="6"/>
      <rect x="136" y="286" width="58" height="12" rx="6"/>
      <rect x="136" y="368" width="66" height="12" rx="6"/>
    </g>
    <!-- gold receipt dots (settled) -->
    <circle cx="368" cy="210" r="9" fill="var(--accent, #FFB300)" opacity="0.95"/>
    <circle cx="368" cy="292" r="9" fill="var(--accent, #FFB300)" opacity="0.6"/>
    <circle cx="368" cy="374" r="9" fill="none" stroke="var(--primary, #FF007A)" stroke-width="3" opacity="0.8"/>
  </g>

  <!-- rising edge arrow, checkmark tail -->
  <g filter="url(#glow)">
    <path d="M128 400 L184 336 L232 366 L382 178" fill="none" stroke="url(#edgeArrow)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- arrowhead (aligned to travel direction ~-51°) -->
    <path d="M406 148 L399 201 L355 166 Z" fill="var(--accent, #FFB300)"/>
  </g>
</svg>
