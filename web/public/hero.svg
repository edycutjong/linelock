<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="LineLock — lock the line, prove the pick. An x402 payment unseals the pick; the receipt timestamps it before kickoff; the ledger scores it against the closing line.">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A12"/><stop offset="0.5" stop-color="#120714"/><stop offset="1" stop-color="#160607"/>
    </linearGradient>
    <linearGradient id="ledgerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4DA6"/><stop offset="0.45" stop-color="#E91E8C"/><stop offset="1" stop-color="#FFD166"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF007A"/><stop offset="1" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4DA6" stop-opacity="0"/><stop offset="0.5" stop-color="#FF4DA6" stop-opacity="0.5"/><stop offset="1" stop-color="#FF4DA6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="packet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.5" stop-color="#FF4DA6"/><stop offset="1" stop-color="#FF007A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraP" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FF007A" stop-opacity="0.55"/><stop offset="1" stop-color="#FF007A" stop-opacity="0"/></radialGradient>
    <radialGradient id="auroraG" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFB300" stop-opacity="0.5"/><stop offset="1" stop-color="#FFB300" stop-opacity="0"/></radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" y="0" fill="#160a14" opacity="0.55"/></pattern>
    <!-- outlined wordmark glyph paths (Space Grotesk 700, size 72, baseline-anchored) -->
