<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="LineLock animated mark — ledger rows settle gold as a rising edge arrow draws itself in">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050807"/><stop offset="0.55" stop-color="#0a120d"/><stop offset="1" stop-color="#0d1710"/>
    </linearGradient>
    <linearGradient id="edgeArrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22ff88"/><stop offset="0.55" stop-color="#7dffb9"/><stop offset="1" stop-color="#ffc247"/>
    </linearGradient>
    <linearGradient id="rowFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12201a"/><stop offset="1" stop-color="#0a120d"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16d474" stop-opacity="0"/><stop offset="0.5" stop-color="#16d474" stop-opacity="0.5"/><stop offset="1" stop-color="#16d474" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.5" stop-color="#ffd685"/><stop offset="1" stop-color="#ffc247" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="15"/></filter>
    <clipPath id="badge"><rect x="24" y="24" width="464" height="464" rx="112"/></clipPath>
    <style>
      @keyframes breathe { 0%,100%{opacity:.24} 82%{opacity:.62} }
      @keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:.9} }
      @keyframes stripdrift { 0%,100%{opacity:.35} 50%{opacity:.8} }
      @keyframes dotsettle { 0%,54%{opacity:.25} 62%,100%{opacity:1} }
      .breath{animation:breathe 6s ease-in-out infinite}
      .tw{animation:twinkle 6s ease-in-out infinite}
      .strip{animation:stripdrift 6s ease-in-out infinite}
      .dot1{animation:dotsettle 6s ease-in-out infinite}
      @media (prefers-reduced-motion: reduce){*{animation:none !important}}
    </style>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <g clip-path="url(#badge)">
    <!-- diagonal energy strips -->
    <g transform="rotate(-35 256 256)">
      <rect class="strip" x="-120" y="118" width="760" height="3" fill="url(#strip)"/>
      <rect class="strip" x="-120" y="196" width="760" height="2" fill="url(#strip)" style="animation-delay:-2s"/>
      <rect class="strip" x="-120" y="392" width="760" height="3" fill="url(#strip)" style="animation-delay:-4s"/>
    </g>
    <g stroke="#22ff88" stroke-width="1" opacity="0.07">
      <line x1="24" y1="152" x2="488" y2="152"/><line x1="24" y1="280" x2="488" y2="280"/><line x1="24" y1="408" x2="488" y2="408"/>
      <line x1="152" y1="24" x2="152" y2="488"/><line x1="280" y1="24" x2="280" y2="488"/><line x1="408" y1="24" x2="408" y2="488"/>
    </g>
    <g fill="#e9f4ee">
      <circle class="tw" cx="102" cy="96" r="2.4"/><circle class="tw" cx="418" cy="132" r="1.8" style="animation-delay:-2s"/>
      <circle class="tw" cx="376" cy="76" r="1.5" style="animation-delay:-1s"/><circle class="tw" cx="88" cy="186" r="1.5" style="animation-delay:-3s"/>
    </g>
  </g>

  <!-- glow-breath duplicate of the arrow -->
  <g class="breath" filter="url(#soft)">
    <path d="M128 400 L184 336 L232 366 L382 178" fill="none" stroke="#22ff88" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ledger rows: draw in one by one -->
  <g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.04;0.1;0.66;0.94;1" dur="6s" repeatCount="indefinite"/>
      <rect x="112" y="180" width="288" height="60" rx="16" fill="url(#rowFill)" stroke="#23402f" stroke-width="2.5"/>
      <rect x="136" y="204" width="74" height="12" rx="6" fill="#4a6356"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.1;0.16;0.66;0.94;1" dur="6s" repeatCount="indefinite"/>
      <rect x="112" y="262" width="288" height="60" rx="16" fill="url(#rowFill)" stroke="#23402f" stroke-width="2.5"/>
      <rect x="136" y="286" width="58" height="12" rx="6" fill="#4a6356"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.16;0.22;0.66;0.94;1" dur="6s" repeatCount="indefinite"/>
      <rect x="112" y="344" width="288" height="60" rx="16" fill="url(#rowFill)" stroke="#23402f" stroke-width="2.5"/>
      <rect x="136" y="368" width="66" height="12" rx="6" fill="#4a6356"/>
    </g>
    <!-- receipt dots settle gold mid-loop -->
    <circle class="dot1" cx="368" cy="210" r="9" fill="#ffc247"/>
    <circle cx="368" cy="292" r="9" fill="#ffc247" opacity="0">
      <animate attributeName="opacity" values="0;0;0.7;0.7;0" keyTimes="0;0.6;0.68;0.94;1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="368" cy="374" r="9" fill="none" stroke="#22ff88" stroke-width="3" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0;0.2;0.26;0.94;1" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- edge arrow draws itself in (seam-safe: fades at loop edge) -->
  <g filter="url(#glow)">
    <path d="M128 400 L184 336 L232 366 L382 178" fill="none" stroke="url(#edgeArrow)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"
      pathLength="100" stroke-dasharray="100">
      <animate attributeName="stroke-dashoffset" values="100;100;0;0;0" keyTimes="0;0.2;0.5;0.94;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.22;0.5;0.94;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <!-- arrowhead pops when the draw completes -->
    <path d="M406 148 L399 201 L355 166 Z" fill="#ffc247" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.56;0.94;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <!-- gold settle burst at the tip -->
    <circle cx="392" cy="166" r="8" fill="none" stroke="#ffd685" stroke-width="3">
      <animate attributeName="r" values="6;6;48;48" keyTimes="0;0.52;0.68;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.85;0;0" keyTimes="0;0.52;0.56;0.7;1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="392" cy="166" r="14" fill="url(#spark)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.5;0.56;0.66;1" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
