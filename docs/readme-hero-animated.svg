<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="LineLock — lock the line, prove the pick. An x402 payment unseals the pick; the receipt timestamps it before kickoff; the ledger scores it against the closing line.">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050807"/><stop offset="0.5" stop-color="#0a120d"/><stop offset="1" stop-color="#0d1710"/>
    </linearGradient>
    <linearGradient id="ledgerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22ff88"/><stop offset="0.5" stop-color="#7dffb9"/><stop offset="1" stop-color="#22ff88"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22ff88"/><stop offset="1" stop-color="#ffc247"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dffb9" stop-opacity="0"/><stop offset="0.5" stop-color="#7dffb9" stop-opacity="0.5"/><stop offset="1" stop-color="#7dffb9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="packet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.5" stop-color="#7dffb9"/><stop offset="1" stop-color="#22ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraP" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#22ff88" stop-opacity="0.55"/><stop offset="1" stop-color="#22ff88" stop-opacity="0"/></radialGradient>
    <radialGradient id="auroraG" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffc247" stop-opacity="0.5"/><stop offset="1" stop-color="#ffc247" stop-opacity="0"/></radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" y="0" fill="#0a140e" opacity="0.55"/></pattern>
    <!-- outlined wordmark glyph paths (Space Grotesk 700, size 72, baseline-anchored) -->
    <path id="wm-line" d="M37.3 0L4.8 0L4.8-50.4L14.3-50.4L14.3-8.6L37.3-8.6L37.3 0ZM53.1 0L44.1 0L44.1-35.7L53.1-35.7L53.1 0ZM48.6-39.9L48.6-39.9Q46.2-39.9 44.5-41.5Q42.8-43.1 42.8-45.6L42.8-45.6Q42.8-48.2 44.5-49.8Q46.2-51.4 48.6-51.4L48.6-51.4Q51.1-51.4 52.8-49.8Q54.4-48.2 54.4-45.6L54.4-45.6Q54.4-43.1 52.8-41.5Q51.1-39.9 48.6-39.9ZM72.3 0L63.2 0L63.2-35.7L72.1-35.7L72.1-31.0L73.4-31.0Q74.3-32.9 76.7-34.6Q79.1-36.3 83.9-36.3L83.9-36.3Q88.1-36.3 91.2-34.4Q94.3-32.5 96.0-29.1Q97.8-25.8 97.8-21.3L97.8-21.3L97.8 0L88.7 0L88.7-20.6Q88.7-24.6 86.7-26.6Q84.7-28.7 81.1-28.7L81.1-28.7Q76.9-28.7 74.6-25.9Q72.3-23.1 72.3-18.1L72.3-18.1L72.3 0ZM123.8 1.0L123.8 1.0Q118.5 1.0 114.4-1.3Q110.4-3.5 108.1-7.7Q105.8-11.8 105.8-17.4L105.8-17.4L105.8-18.3Q105.8-23.9 108.1-28.0Q110.3-32.2 114.3-34.5Q118.4-36.7 123.7-36.7L123.7-36.7Q129.0-36.7 132.8-34.4Q136.7-32.0 138.9-27.9Q141.0-23.8 141.0-18.3L141.0-18.3L141.0-15.2L115.1-15.2Q115.2-11.5 117.8-9.2Q120.4-6.9 124.1-6.9L124.1-6.9Q127.9-6.9 129.7-8.6Q131.5-10.2 132.5-12.2L132.5-12.2L139.9-8.4Q138.9-6.5 137.0-4.3Q135.1-2.1 131.9-0.5Q128.7 1.0 123.8 1.0ZM115.1-22.0L115.1-22.0L131.8-22.0Q131.5-25.1 129.3-26.9Q127.2-28.8 123.6-28.8L123.6-28.8Q120.0-28.8 117.8-26.9Q115.6-25.1 115.1-22.0Z"/>
    <path id="wm-lock" d="M37.3 0L4.8 0L4.8-50.4L14.3-50.4L14.3-8.6L37.3-8.6L37.3 0ZM61.1 1.0L61.1 1.0Q55.7 1.0 51.5-1.2Q47.2-3.3 44.8-7.4Q42.3-11.5 42.3-17.3L42.3-17.3L42.3-18.4Q42.3-24.2 44.8-28.3Q47.2-32.4 51.5-34.6Q55.7-36.7 61.1-36.7L61.1-36.7Q66.4-36.7 70.6-34.6Q74.9-32.4 77.3-28.3Q79.8-24.2 79.8-18.4L79.8-18.4L79.8-17.3Q79.8-11.5 77.3-7.4Q74.9-3.3 70.6-1.2Q66.4 1.0 61.1 1.0ZM61.1-7.1L61.1-7.1Q65.2-7.1 68.0-9.8Q70.7-12.5 70.7-17.5L70.7-17.5L70.7-18.2Q70.7-23.3 68.0-26.0Q65.3-28.7 61.1-28.7L61.1-28.7Q56.9-28.7 54.1-26.0Q51.4-23.3 51.4-18.2L51.4-18.2L51.4-17.5Q51.4-12.5 54.1-9.8Q56.9-7.1 61.1-7.1ZM104.9 1.0L104.9 1.0Q99.7 1.0 95.5-1.2Q91.3-3.3 88.8-7.4Q86.4-11.5 86.4-17.4L86.4-17.4L86.4-18.4Q86.4-24.2 88.8-28.3Q91.3-32.4 95.5-34.6Q99.7-36.7 104.9-36.7L104.9-36.7Q110.0-36.7 113.7-34.9Q117.4-33.1 119.6-30.0Q121.9-26.9 122.6-22.9L122.6-22.9L113.8-21.0Q113.5-23.2 112.5-24.9Q111.5-26.6 109.7-27.6Q107.9-28.7 105.1-28.7L105.1-28.7Q102.4-28.7 100.2-27.5Q98.0-26.3 96.7-23.9Q95.5-21.6 95.5-18.2L95.5-18.2L95.5-17.5Q95.5-14.1 96.7-11.8Q98.0-9.4 100.2-8.2Q102.4-7.1 105.1-7.1L105.1-7.1Q109.2-7.1 111.3-9.2Q113.5-11.3 114.0-14.8L114.0-14.8L122.8-12.7Q121.9-8.9 119.6-5.7Q117.4-2.6 113.7-0.8Q110.0 1.0 104.9 1.0ZM139.4 0L130.3 0L130.3-50.4L139.4-50.4L139.4-22.5L140.7-22.5L152.5-35.7L164.3-35.7L147.8-18.4L164.9 0L153.2 0L140.7-14.2L139.4-14.2L139.4 0Z"/>
    <clipPath id="lockClip"><use href="#wm-lock" x="149.1"/></clipPath>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="trail" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3.2"/></filter>
    <clipPath id="plateClip"><rect x="0" y="0" width="1280" height="320" rx="26"/></clipPath>
    <g id="lk"><rect x="0" y="5.4" width="11" height="7.8" rx="1.6" fill="currentColor"/><path d="M2.2 5.4 V3.6 A3.3 3.3 0 0 1 8.8 3.6 V5.4" fill="none" stroke="currentColor" stroke-width="1.5"/></g>
    <style>
      @keyframes metricPulse{0%,100%{opacity:.6}50%{opacity:1}}
      @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.9}}
      @keyframes markBreath{0%,100%{opacity:.3}82%{opacity:.66}}
      @keyframes stripPulse{0%,100%{opacity:.3}50%{opacity:.7}}
      @keyframes glitch{0%,7%,60%,100%{transform:translate(0,0)}61%{transform:translate(-2px,0)}63%{transform:translate(2px,1px)}65%{transform:translate(-1px,-1px)}8%{transform:translate(1.5px,0)}10%{transform:translate(-1.5px,0)}12%{transform:translate(0,0)}}
      .mp{animation:metricPulse 8s ease-in-out infinite}
      .tw{animation:twinkle 8s ease-in-out infinite}
      .mb{animation:markBreath 8s ease-in-out infinite}
      .sp{animation:stripPulse 8s ease-in-out infinite}
      .wm-main{animation:glitch 8s steps(1,end) infinite}
      @media (prefers-reduced-motion: reduce){*{animation:none !important}}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="320" rx="26" fill="url(#plate)"/>
  <g clip-path="url(#plateClip)">
    <!-- aurora blobs -->
    <circle cx="300" cy="110" r="150" fill="url(#auroraP)" filter="url(#soft)"><animate attributeName="cx" values="300;360;300" dur="17s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="240" r="160" fill="url(#auroraG)" filter="url(#soft)"><animate attributeName="cy" values="240;190;240" dur="15s" repeatCount="indefinite"/></circle>
    <!-- diagonal energy strips -->
    <g class="sp" transform="rotate(-35 640 160)" stroke-width="2">
      <line x1="-200" y1="40" x2="1480" y2="40" stroke="#16d474" opacity="0.14"/>
      <line x1="-200" y1="240" x2="1480" y2="240" stroke="#16d474" opacity="0.1"/>
      <line x1="-200" y1="440" x2="1480" y2="440" stroke="#16d474" opacity="0.12"/>
    </g>
    <!-- stars -->
    <g fill="#e9f4ee">
      <circle class="tw" cx="180" cy="46" r="1.6"/><circle class="tw" cx="520" cy="40" r="1.4" style="animation-delay:-2s"/>
      <circle class="tw" cx="760" cy="56" r="1.8" style="animation-delay:-3s"/><circle class="tw" cx="1120" cy="44" r="1.5" style="animation-delay:-1s"/>
      <circle class="tw" cx="960" cy="70" r="1.3" style="animation-delay:-4s"/><circle class="tw" cx="640" cy="30" r="1.3" style="animation-delay:-2.6s"/>
    </g>
    <!-- scanlines -->
    <rect x="0" y="0" width="1280" height="320" fill="url(#scan)" opacity="0.35"/>
    <!-- beam sweep (one per loop) -->
    <rect x="-260" y="0" width="220" height="320" fill="url(#beam)" opacity="0.45" transform="skewX(-18)">
      <animate attributeName="x" values="-300;-300;1500;1500" keyTimes="0;0.12;0.5;1" dur="8s" repeatCount="indefinite"/>
    </rect>

    <!-- ================= RIGHT: STORY ================= -->
    <!-- pipeline rail -->
    <line x1="600" y1="104" x2="1196" y2="104" stroke="#2c5940" stroke-width="2" stroke-dasharray="2 6" opacity="0.8"/>
    <!-- node A: buyer wallet -->
    <g>
      <rect x="576" y="86" width="48" height="36" rx="7" fill="#0f2417" stroke="#22ff88" stroke-width="1.6"/>
      <rect x="576" y="86" width="48" height="11" rx="5" fill="#22ff88" opacity="0.45"/>
      <circle cx="614" cy="108" r="3.5" fill="#7dffb9"/>
      <text x="600" y="140" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#8bc9a6">agent</text>
    </g>
    <!-- x402 gate -->
    <g>
      <path d="M838 80 L864 94 L864 118 L838 132 L812 118 L812 94 Z" fill="#0a2b1a" stroke="#22ff88" stroke-width="1.8">
        <animate attributeName="stroke" values="#22ff88;#ffd685;#22ff88;#22ff88" keyTimes="0;0.42;0.5;1" dur="8s" repeatCount="indefinite"/>
      </path>
      <text x="838" y="111" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="700" fill="#a8ffd2">402</text>
      <text x="838" y="152" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#8bc9a6">x402 · 0.05 USDC</text>
    </g>
    <!-- node C: receipt block -->
    <g>
      <path d="M1044 82 L1070 96 L1070 112 L1044 126 L1018 112 L1018 96 Z" fill="#231604" stroke="#ffc247" stroke-width="1.6"/>
      <text x="1044" y="108" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#ffd685">0x·✓</text>
      <text x="1044" y="140" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#cfa96a">receipt</text>
      <!-- receipt ripple on packet arrival -->
      <circle cx="1044" cy="104" r="10" fill="none" stroke="#ffd685" stroke-width="2.5">
        <animate attributeName="r" values="8;8;40;40" keyTimes="0;0.5;0.66;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.5;0.54;0.68;1" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- node D: public ledger -->
    <g>
      <rect x="1174" y="86" width="44" height="36" rx="7" fill="#0f2417" stroke="#ffc247" stroke-width="1.6"/>
      <g stroke="#ffd685" stroke-width="1.6"><line x1="1182" y1="97" x2="1210" y2="97"/><line x1="1182" y1="104" x2="1210" y2="104"/><line x1="1182" y1="111" x2="1204" y2="111"/></g>
      <text x="1196" y="140" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#cfa96a">ledger</text>
    </g>
    <!-- packet comet along the rail -->
    <g>
      <circle r="15" fill="url(#packet)" filter="url(#trail)"/>
      <circle r="5" fill="#ffffff"><animate attributeName="fill" values="#ffffff;#ffffff;#ffd685;#ffd685" keyTimes="0;0.42;0.5;1" dur="8s" repeatCount="indefinite"/></circle>
      <animateMotion path="M600 104 L1196 104" keyPoints="0;0;1;1" keyTimes="0;0.14;0.74;1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.13;0.16;0.74;0.8;1" dur="8s" repeatCount="indefinite"/>
    </g>

    <!-- two-panes: the pick / the ledger -->
    <!-- PICK pane (unseals) -->
    <g>
      <rect x="592" y="176" width="296" height="104" rx="12" fill="#0b1610" fill-opacity="0.78" stroke="#2a4636" stroke-width="1.4"/>
      <text x="612" y="204" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="12" letter-spacing="2" fill="#648b74">NEXT PICK · SF · FRA VS ESP</text>
      <!-- sealed state -->
      <g><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.52;0.575;0.97;1" dur="8s" repeatCount="indefinite"/>
        <rect x="612" y="222" width="164" height="24" rx="6" fill="#0a2b1a" stroke="#22ff88" stroke-width="1.3"/>
        <text x="622" y="239" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" letter-spacing="3" fill="#a8ffd2">▓▓▓ @ ▓.▓▓</text>
        <use href="#lk" x="754" y="227" color="#a8ffd2"/>
        <text x="612" y="268" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#648b74">pay to reveal · no keys, no accounts</text>
      </g>
      <!-- revealed state -->
      <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.585;0.64;0.97;1" dur="8s" repeatCount="indefinite"/>
        <text x="612" y="240" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="19" font-weight="700" fill="#7dffb9">FRA ML @ 2.10 · edge +12%</text>
        <text x="612" y="264" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#a9d9bf">ladder R1 1% · R2 2% · R3 3%</text>
      </g>
    </g>
    <!-- LEDGER pane (CLV pop) -->
    <g>
      <rect x="904" y="176" width="312" height="104" rx="12" fill="#171004" fill-opacity="0.78" stroke="#ffc247" stroke-width="1.5"/>
      <text x="924" y="204" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="12" letter-spacing="2" fill="#c9a35f">SETTLED LEDGER · LOSSES INCLUDED</text>
      <text x="924" y="238" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14" fill="#d8c9a8">QF: ENG 1.85 ✓ · paid T−46h</text>
      <rect x="924" y="250" width="132" height="22" rx="6" fill="#231604" stroke="#ffc247" stroke-width="1.2"/>
      <text x="934" y="266" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#ffd685">0x9c2e…77aa ↗</text>
      <!-- CLV badge pops late in the loop -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.74;0.8;0.97;1" dur="8s" repeatCount="indefinite"/>
        <rect x="1078" y="246" width="118" height="30" rx="15" fill="url(#edge)"/>
        <text x="1137" y="266" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14" font-weight="700" fill="#1a1102">CLV +6.8%</text>
      </g>
    </g>

    <!-- ================= LEFT: BRAND ================= -->
    <!-- glow-breath duplicate of mini mark -->
    <g class="mb" filter="url(#soft)">
      <path d="M66 138 L84 116 L98 124 L136 82" fill="none" stroke="#22ff88" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- mini mark: two ledger rows + rising arrow -->
    <g filter="url(#glow)">
      <rect x="58" y="92" width="66" height="20" rx="6" fill="#12201a" stroke="#2a4636" stroke-width="1.6"/>
      <rect x="58" y="120" width="66" height="20" rx="6" fill="#12201a" stroke="#2a4636" stroke-width="1.6"/>
      <circle cx="112" cy="102" r="4" fill="#ffc247"/>
      <circle cx="112" cy="130" r="4" fill="none" stroke="#22ff88" stroke-width="2"/>
      <path d="M66 138 L84 116 L98 124 L130 88" fill="none" stroke="url(#edge)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M136 78 L134 96 L119 84 Z" fill="#ffc247"/>
    </g>

    <!-- outlined wordmark: Line (white) + Lock (green→amber gradient) -->
    <g transform="translate(156,124) scale(0.9)">
      <!-- chromatic ghosts -->
      <g fill="#22ff88" opacity="0.3" transform="translate(-2.6,0)"><use href="#wm-line"/><use href="#wm-lock" x="149.1"/></g>
      <g fill="#ffc247" opacity="0.3" transform="translate(2.6,0)"><use href="#wm-line"/><use href="#wm-lock" x="149.1"/></g>
      <!-- main -->
      <g class="wm-main">
        <use href="#wm-line" fill="#eaf6ee"/>
        <use href="#wm-lock" x="149.1" fill="url(#ledgerGrad)"/>
        <!-- shimmer sweep over Ledger -->
        <g clip-path="url(#lockClip)">
          <rect x="150" y="-54" width="34" height="62" fill="#ffffff" opacity="0.55" transform="skewX(-20)">
            <animate attributeName="x" values="120;120;340;340" keyTimes="0;0.28;0.5;1" dur="8s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;0;0.6;0;0" keyTimes="0;0.28;0.4;0.52;1" dur="8s" repeatCount="indefinite"/>
          </rect>
        </g>
      </g>
    </g>

    <!-- tagline -->
    <text x="60" y="176" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#dbf0e4">Lock the line. Prove the pick.</text>
    <!-- hero metric (pulsing) -->
    <text class="mp" x="60" y="206" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13.5" fill="#ffd685">Paid 46h before kickoff — the receipt can't lie.</text>
    <!-- divider -->
    <rect x="60" y="224" width="360" height="1" fill="#2c5940" opacity="0.6"/>
    <!-- tech pills -->
    <text x="60" y="250" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#6f9a83" letter-spacing="0.4">Injective x402 · USDC CCTP · MCP Server · Agent Skills</text>
  </g>
  <rect x="0.75" y="0.75" width="1278.5" height="318.5" rx="25.5" fill="none" stroke="#234a36" stroke-width="1.5" opacity="0.7"/>
</svg>
