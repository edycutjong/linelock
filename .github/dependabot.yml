version: 2
updates:
  # Root API + engine (tsx / vitest / express / viem / x402)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # web/ has its own lockfile (Next.js 14 ledger site)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # GitHub Actions used by the CI/CD pipeline
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
