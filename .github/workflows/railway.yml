name: Deploy API to Railway

# Deploys the Express x402 API (Dockerfile) to Railway.
# Optional repo secret:   RAILWAY_TOKEN   (a Railway *project* token)
# Optional repo variable: RAILWAY_SERVICE (Railway service name; defaults to "linelock")
# The API is CLI-deployed; without RAILWAY_TOKEN this job green-skips instead of failing.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "web/**"
      - "**/*.md"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'edycutjong' }}
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Check for RAILWAY_TOKEN
        id: token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RAILWAY_TOKEN not configured — skipping CI deploy (API is CLI-deployed)."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v7
        if: steps.token.outputs.present == 'true'
      - uses: actions/setup-node@v7
        if: steps.token.outputs.present == 'true'
        with:
          node-version: 20
      - name: Install Railway CLI
        if: steps.token.outputs.present == 'true'
        run: npm install -g @railway/cli
      - name: Deploy
        if: steps.token.outputs.present == 'true'
        run: railway up --service "${{ vars.RAILWAY_SERVICE || 'linelock' }}" --ci
