name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality (engine + API, parallel with Stage 2) ──
  quality:
    name: "Stage 1 · Quality (engine + API)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Full matrix on main push, single Node on PRs (saves CI minutes)
        node-version: ${{ github.event_name == 'push' && fromJSON('[20, 22, 24]') || fromJSON('[20]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type check (tsc --noEmit)
        run: npm run typecheck
      - name: "Unit tests with coverage (vitest — 70 tests: edge, ladder, CLV, hash, similar, settle, invariants I1-I5, 402 handshake)"
        run: npm run test:coverage
      - name: Submission readiness (funds-gated items reported pending — never faked)
        run: npm run readiness
      - name: Upload coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── STAGE 2: Security Gate (parallel with Stage 1) ────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full history for scanning git commits
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: npm audit — root (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true # Don't block on transitive dep issues
      - name: npm audit — web (high + critical)
        run: npm --prefix web audit --audit-level=high
        continue-on-error: true
      - name: License compliance check
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0" --summary
        continue-on-error: true

  # ── STAGE 3: Build Verification (web/ Next.js app) ────────
  build:
    name: "Stage 3 · Build (web/)"
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
      - name: Install root dependencies
        run: npm ci
      - name: Install web dependencies (web/ has its own lockfile — not a workspace)
        run: npm --prefix web ci
      - name: Next.js production build (web/)
        run: npm run web:build
      - name: Bundle size report (web/.next/static)
        run: |
          echo "📦 web/ bundle size"
          echo "─────────────────────"
          if [ -d "web/.next/static" ]; then
            TOTAL_SIZE=$(du -sk web/.next/static | cut -f1)
            echo "Total static assets: ${TOTAL_SIZE}KB"
            if [ "$TOTAL_SIZE" -gt 2000 ]; then
              echo "::warning::Bundle size ${TOTAL_SIZE}KB exceeds 2000KB soft budget"
            else
              echo "✅ Bundle size within 2000KB budget"
            fi
          fi

  # ── STAGE 4: E2E Tests (Playwright vs the web/ app) ───────
  e2e:
    name: "Stage 4 · E2E (Playwright)"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
      - name: Install root dependencies
        run: npm ci
      - name: Install web dependencies
        run: npm --prefix web ci
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests (webServer builds + starts web/ on :3402 — no env keys, demo mode)
        run: npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ── STAGE 5: Performance (Lighthouse CI vs the web/ app) ──
  performance:
    name: "Stage 5 · Performance (Lighthouse)"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
      - name: Install root dependencies
        run: npm ci
      - name: Install web dependencies
        run: npm --prefix web ci
      - name: Build web/ (Lighthouse serves the production build)
        run: npm run web:build
      - name: Lighthouse CI
        run: npm run lighthouse
        continue-on-error: true # Advisory — don't block deploys on perf regressions yet

  # ── STAGE 6: Deploy Gate (main only) ──────────────────────
  deploy-gate:
    name: "Stage 6 · Deploy Gate"
    needs: [build, e2e, performance, secret-scan, dependency-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: All gates passed
        run: |
          echo "🚀 All CI/CD gates passed!"
          echo ""
          echo "Pipeline Summary:"
          echo "  ✅ Stage 1 — Quality (tsc --noEmit + vitest 70 w/ coverage + readiness)"
          echo "  ✅ Stage 2 — Secret Scanning (TruffleHog)"
          echo "  ✅ Stage 2 — Dependency Audit (npm root + web)"
          echo "  ✅ Stage 3 — Build (web/ Next.js production)"
          echo "  ✅ Stage 4 — E2E Tests (Playwright, demo mode)"
          echo "  ✅ Stage 5 — Performance (Lighthouse CI)"
