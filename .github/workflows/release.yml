name: Release

# Automatic semantic versioning: conventional commits on main are analyzed and,
# when releasable (feat/fix/perf/breaking), a version bump + CHANGELOG + git tag +
# GitHub Release are produced automatically. docs:/chore:/test: commits release nothing.
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'edycutjong' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx -y -p semantic-release@24 -p @semantic-release/changelog@6 -p @semantic-release/git@10 semantic-release
